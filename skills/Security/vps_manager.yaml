# ============================================
# VPS Manager Skill (via Tailscale SSH)
# ============================================
# Manage your VPS from Termux using SSH over the Tailscale private network.
# No public port exposure — connection is always through Tailscale (100.x.x.x).
#
# Prerequisites:
#   - Tailscale running on both Termux and VPS
#   - SSH key from termux_hardening already added to VPS authorized_keys
#   - VPS Tailscale IP (run: tailscale ip -4 on the VPS)
#
# Usage:
#   run_skill vps_manager vps_host=100.x.x.x vps_user=juanitto
#   run_skill vps_manager vps_host=100.x.x.x vps_user=juanitto ssh_key=~/.ssh/id_ed25519

name: vps_manager
description: >
  Full VPS status dashboard via SSH over Tailscale. Shows system health,
  disk, memory, processes, firewall, fail2ban, Docker, and recent logins.
  Runs system updates when requested. All connections via Tailscale private IP.
version: "1.1.0"
author: digitalAIventures LLC
tags:
  - vps
  - ssh
  - tailscale
  - monitoring
  - management

parameters:
  vps_host:
    description: VPS Tailscale IP address (100.x.x.x — NOT the public IP)
    type: string
    required: true

  vps_user:
    description: SSH username on the VPS
    type: string
    required: true

  ssh_key:
    description: Path to your local SSH private key
    type: string
    required: false
    default: "~/.ssh/id_ed25519"

commands:
  # ── 1. Tailscale connectivity check (local) ────────────────────────────────
  - >-
    echo "=== Tailscale Status ===" &&
    tailscale status 2>/dev/null | head -5 ||
    echo "Tailscale not running locally — install with: pkg install tailscale"

  # ── 2. Full dashboard in a single SSH session ──────────────────────────────
  # One connection, one command — avoids per-command truncation and is much
  # faster than 13 separate SSH sessions.
  - |
    ssh -i {{ssh_key}} \
        -o StrictHostKeyChecking=accept-new \
        -o ConnectTimeout=10 \
        -o BatchMode=yes \
        {{vps_user}}@{{vps_host}} 'bash -s' <<'REMOTE_DASHBOARD'
    echo "=== SYSTEM ==="
    uname -a
    echo ""
    uptime
    echo ""
    grep PRETTY /etc/os-release 2>/dev/null || true

    echo ""
    echo "=== DISK ==="
    df -h --total 2>/dev/null | grep -E "(Filesystem|/dev/|total)" || df -h

    echo ""
    echo "=== MEMORY ==="
    free -h

    echo ""
    echo "=== TOP PROCESSES (CPU) ==="
    ps aux --sort=-%cpu | head -11

    echo ""
    echo "=== LISTENING PORTS ==="
    ss -tuln

    echo ""
    echo "=== UFW FIREWALL ==="
    sudo ufw status verbose 2>/dev/null || echo "UFW not available"

    echo ""
    echo "=== FAIL2BAN ==="
    sudo fail2ban-client status 2>/dev/null || echo "fail2ban not running"
    sudo fail2ban-client status sshd 2>/dev/null || true

    echo ""
    echo "=== DOCKER ==="
    docker ps -a 2>/dev/null || echo "Docker not available"

    echo ""
    echo "=== RECENT LOGINS ==="
    last | head -10
    echo ""
    FAILED=$(sudo grep -c 'Failed' /var/log/auth.log 2>/dev/null || sudo journalctl -u ssh --since '24 hours ago' 2>/dev/null | grep -c 'Failed' || echo 0)
    echo "Failed SSH attempts (24h): $FAILED"

    echo ""
    echo "=== AVAILABLE UPDATES ==="
    sudo apt-get -s upgrade 2>/dev/null | grep -E '^[0-9]+ upgraded' || echo "Run: sudo apt update first"

    echo ""
    echo "=== RKHUNTER LAST RUN ==="
    sudo tail -20 /var/log/rkhunter.log 2>/dev/null | grep -E '(Warning|OK|Rootkit)' | tail -5 || echo "rkhunter not installed"

    echo ""
    echo "=== LYNIS LAST AUDIT SCORE ==="
    sudo grep -i 'hardening index' /var/log/lynis.log 2>/dev/null | tail -1 || echo "Lynis not installed or not run yet"
    REMOTE_DASHBOARD

  # ── 3. Summary ──────────────────────────────────────────────────────────────
  - 'echo "" && echo "=== VPS MANAGER COMPLETE === Connection: {{vps_user}}@{{vps_host}} (Tailscale)"'

require_confirmation: false
parallel: false
retry_count: 0
timeout: 120
