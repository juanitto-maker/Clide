# ============================================
# VPS Security Hardening Skill (via Tailscale SSH)
# ============================================
# Based on the digitalAIventures LLC VPS Hardening Guide.
# Automates the full hardening sequence over SSH. Uses sed/tee instead of
# interactive nano. No Chinese mirrors — Docker from download.docker.com,
# Tailscale from tailscale.com.
#
# IMPORTANT SAFETY NOTES:
#   - kernel.modules_disabled is intentionally NOT set to 1 (causes boot lock).
#   - The step that removes ufw allow 22/tcp is SKIPPED. After confirming
#     Tailscale SSH works from a second Termux session, run manually:
#       sudo ufw delete allow 22/tcp && sudo ufw reload
#   - Run with require_confirmation: true (default).
#
# Usage:
#   run_skill vps_hardening vps_host=PUBLIC_IP vps_user=root vps_newuser=juanitto
#   (Use PUBLIC IP for initial run, Tailscale IP for subsequent runs)

name: vps_hardening
description: >
  Full VPS security hardening via SSH: system update, admin user creation,
  SSH/UFW/fail2ban hardening, IPv6 disable, kernel hardening, rkhunter, lynis,
  Tailscale install, rootless Docker + clawdbot compose setup, final cleanup.
  No Chinese mirrors. kernel.modules_disabled omitted for safe boot.
version: "2.0.0"
author: digitalAIventures LLC
tags:
  - vps
  - security
  - hardening
  - ssh
  - docker
  - tailscale
  - fail2ban
  - ufw

parameters:
  vps_host:
    description: VPS IP address (public IP for first run, Tailscale 100.x.x.x after Tailscale is set up)
    type: string
    required: true

  vps_user:
    description: Initial SSH username (root or default VPS user like ubuntu)
    type: string
    required: true

  vps_newuser:
    description: New admin username to create on the VPS
    type: string
    required: false
    default: "juanitto"

  ssh_key:
    description: Path to local SSH private key (from termux_hardening skill)
    type: string
    required: false
    default: "~/.ssh/id_ed25519"

commands:
  # ── 1. Verify SSH connectivity ─────────────────────────────────────────────
  - 'ssh -i {{ssh_key}} -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 -o BatchMode=yes {{vps_user}}@{{vps_host}} "echo Connected as $(whoami) on $(hostname)"'

  # ── 2. System update + user creation + SSH/UFW/fail2ban + unattended upgrades
  #    (was steps 1-6)
  - |
    ssh -i {{ssh_key}} \
        -o StrictHostKeyChecking=accept-new \
        -o ConnectTimeout=15 \
        -o BatchMode=yes \
        {{vps_user}}@{{vps_host}} 'bash -s' <<PHASE1
    SP="${SUDO_PASSWORD}"

    echo "=== [1] System update ==="
    DEBIAN_FRONTEND=noninteractive echo "\$SP" | sudo -S apt update \
      && DEBIAN_FRONTEND=noninteractive echo "\$SP" | sudo -S apt upgrade -y \
      && DEBIAN_FRONTEND=noninteractive echo "\$SP" | sudo -S apt dist-upgrade -y \
      && echo "\$SP" | sudo -S apt autoremove -y \
      && echo "\$SP" | sudo -S apt autoclean \
      && echo "[1] System updated"

    echo ""
    echo "=== [2] Create admin user ==="
    id {{vps_newuser}} 2>/dev/null && echo "User {{vps_newuser}} already exists" || {
      NEW_PASS=\$(openssl rand -base64 16 | tr -dc 'a-zA-Z0-9' | head -c 24)
      echo "\$SP" | sudo -S adduser --disabled-password --gecos '' {{vps_newuser}} \
        && echo "{{vps_newuser}}:\$NEW_PASS" | echo "\$SP" | sudo -S chpasswd \
        && echo "\$SP" | sudo -S usermod -aG sudo {{vps_newuser}} \
        && echo "\$SP" | sudo -S mkdir -p /home/{{vps_newuser}}/.ssh \
        && (echo "\$SP" | sudo -S cp ~/.ssh/authorized_keys /home/{{vps_newuser}}/.ssh/ 2>/dev/null \
            || echo "\$SP" | sudo -S cp /root/.ssh/authorized_keys /home/{{vps_newuser}}/.ssh/ 2>/dev/null \
            || true) \
        && echo "\$SP" | sudo -S chown -R {{vps_newuser}}:{{vps_newuser}} /home/{{vps_newuser}}/.ssh \
        && echo "\$SP" | sudo -S chmod 700 /home/{{vps_newuser}}/.ssh \
        && echo "\$SP" | sudo -S chmod 600 /home/{{vps_newuser}}/.ssh/authorized_keys \
        && echo "[2] User {{vps_newuser}} created. Password: \$NEW_PASS — SAVE THIS!"
    }

    echo ""
    echo "=== [3] SSH hardening ==="
    echo "\$SP" | sudo -S sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config \
      && echo "\$SP" | sudo -S sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config \
      && echo "\$SP" | sudo -S sed -i 's/^#\?PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config \
      && echo "\$SP" | sudo -S sed -i 's/^#\?ChallengeResponseAuthentication.*/ChallengeResponseAuthentication no/' /etc/ssh/sshd_config \
      && echo "\$SP" | sudo -S sed -i 's/^#\?X11Forwarding.*/X11Forwarding no/' /etc/ssh/sshd_config \
      && echo "\$SP" | sudo -S sshd -t \
      && echo "\$SP" | sudo -S systemctl restart ssh \
      && echo "[3] SSH hardened: password auth disabled, root login disabled"

    echo ""
    echo "=== [4] UFW firewall ==="
    echo "\$SP" | sudo -S ufw default deny incoming \
      && echo "\$SP" | sudo -S ufw default allow outgoing \
      && echo "\$SP" | sudo -S ufw allow 22/tcp \
      && echo "\$SP" | sudo -S ufw --force enable \
      && echo "\$SP" | sudo -S ufw status verbose \
      && echo "[4] UFW enabled with port 22 open"

    echo ""
    echo "=== [5] fail2ban ==="
    echo "\$SP" | sudo -S apt install fail2ban -y \
      && echo "\$SP" | sudo -S cp /etc/fail2ban/jail.conf /etc/fail2ban/jail.local \
      && printf '\n[sshd]\nenabled = true\nport    = 22\nlogpath = %%(sshd_log)s\nmaxretry = 3\nbantime = 3600\n' | echo "\$SP" | sudo -S tee -a /etc/fail2ban/jail.local \
      && echo "\$SP" | sudo -S systemctl start fail2ban \
      && echo "\$SP" | sudo -S systemctl enable fail2ban \
      && echo "\$SP" | sudo -S fail2ban-client status sshd \
      && echo "[5] fail2ban configured for SSH (3 retries, 1hr ban)"

    echo ""
    echo "=== [6] Unattended upgrades ==="
    echo "\$SP" | sudo -S apt install unattended-upgrades -y \
      && DEBIAN_FRONTEND=noninteractive echo "\$SP" | sudo -S dpkg-reconfigure -plow unattended-upgrades \
      && echo "[6] Unattended upgrades configured"
    PHASE1

  # ── 3. Kernel hardening + services + security tools + SSH tightening + ping
  #    (was steps 7-12)
  - |
    ssh -i {{ssh_key}} \
        -o StrictHostKeyChecking=accept-new \
        -o ConnectTimeout=15 \
        -o BatchMode=yes \
        {{vps_user}}@{{vps_host}} 'bash -s' <<PHASE2
    SP="${SUDO_PASSWORD}"

    echo "=== [7] Shared memory protection ==="
    grep -q 'tmpfs /run/shm' /etc/fstab \
      || echo 'tmpfs /run/shm tmpfs defaults,noexec,nosuid 0 0' | echo "\$SP" | sudo -S tee -a /etc/fstab
    echo "\$SP" | sudo -S systemctl daemon-reload
    echo "\$SP" | sudo -S mount -o remount /run/shm 2>/dev/null || true
    echo "[7] Shared memory (/run/shm) protected noexec,nosuid"

    echo ""
    echo "=== [8] Disable unnecessary services ==="
    for svc in bluetooth cups avahi-daemon ModemManager multipathd packagekit; do
      echo "\$SP" | sudo -S systemctl disable --now \$svc 2>/dev/null && echo "Disabled: \$svc" || echo "Not found: \$svc"
    done
    echo "[8] Unnecessary services disabled"

    echo ""
    echo "=== [9] IPv6 disable + kernel hardening ==="
    grep -q 'disable_ipv6' /etc/sysctl.conf || \
    printf '\n# === Clide VPS Hardening ===\n# IPv6 disable\nnet.ipv6.conf.all.disable_ipv6 = 1\nnet.ipv6.conf.default.disable_ipv6 = 1\nnet.ipv6.conf.lo.disable_ipv6 = 1\n# Kernel hardening\nnet.ipv4.conf.all.rp_filter = 1\nnet.ipv4.conf.default.rp_filter = 1\nnet.ipv4.icmp_echo_ignore_broadcasts = 1\nnet.ipv4.conf.all.send_redirects = 0\nnet.ipv4.conf.default.send_redirects = 0\nnet.ipv4.icmp_ignore_bogus_error_responses = 1\nkernel.dmesg_restrict = 1\nkernel.kptr_restrict = 2\n# Lynis fixes (safe)\nfs.suid_dumpable = 0\nnet.ipv4.conf.all.log_martians = 1\nnet.ipv4.conf.default.log_martians = 1\ndev.tty.ldisc_autoload = 0\nfs.protected_fifos = 2\nkernel.core_uses_pid = 1\nkernel.perf_event_paranoid = 3\nkernel.sysrq = 0\nkernel.unprivileged_bpf_disabled = 1\nnet.core.bpf_jit_harden = 2\nnet.ipv4.conf.all.forwarding = 0\nnet.ipv4.conf.default.accept_source_route = 0\n# === End Clide Hardening ===\n' | echo "\$SP" | sudo -S tee -a /etc/sysctl.conf
    echo "\$SP" | sudo -S sysctl -p
    echo "[9] IPv6 disabled. Kernel hardened."

    echo ""
    echo "=== [10] rkhunter + lynis ==="
    echo "\$SP" | sudo -S apt install rkhunter lynis -y \
      && echo "\$SP" | sudo -S rkhunter --propupd \
      && echo "\$SP" | sudo -S rkhunter --check --sk 2>&1 | grep -E '(Warning|OK \[)' | tail -10 \
      && echo "[10] rkhunter checked. Running lynis..." \
      && echo "\$SP" | sudo -S lynis audit system 2>&1 | grep -E '(Hardening index|Warning|Suggestion)' | head -15 \
      && echo "[10] lynis done — check /var/log/lynis.log for full report"

    echo ""
    echo "=== [11] Block ping ==="
    echo "\$SP" | sudo -S sed -i 's/-A ufw-before-input -p icmp --icmp-type echo-request -j ACCEPT/-A ufw-before-input -p icmp --icmp-type echo-request -j DROP/' /etc/ufw/before.rules \
      && echo "\$SP" | sudo -S ufw reload \
      && echo "[11] Ping (ICMP echo-request) blocked"

    echo ""
    echo "=== [12] SSH tightening + legal banner ==="
    printf '***************************************************************************\n                            NOTICE TO USERS\nThis system is for authorized use only. All activities are monitored\nand recorded. Unauthorized access will be prosecuted.\n***************************************************************************\n' | echo "\$SP" | sudo -S tee /etc/issue.net
    echo "\$SP" | sudo -S cp /etc/issue.net /etc/issue
    for kv in 'MaxAuthTries 3' 'AllowTcpForwarding no' 'AllowAgentForwarding no' 'LogLevel VERBOSE' 'ClientAliveCountMax 2' 'MaxSessions 2' 'TCPKeepAlive no'; do
      key=\$(echo \$kv | awk '{print \$1}')
      grep -q "^\$key" /etc/ssh/sshd_config \
        && echo "\$SP" | sudo -S sed -i "s/^\$key.*/\$kv/" /etc/ssh/sshd_config \
        || echo "\$kv" | echo "\$SP" | sudo -S tee -a /etc/ssh/sshd_config
    done
    grep -q '^Banner' /etc/ssh/sshd_config \
      && echo "\$SP" | sudo -S sed -i 's|^Banner.*|Banner /etc/issue.net|' /etc/ssh/sshd_config \
      || echo 'Banner /etc/issue.net' | echo "\$SP" | sudo -S tee -a /etc/ssh/sshd_config
    echo "\$SP" | sudo -S sshd -t && echo "\$SP" | sudo -S systemctl restart ssh
    echo "[12] SSH tightened (MaxAuthTries 3, no forwarding, verbose log) + banner set"
    PHASE2

  # ── 4. Tailscale + Docker + rootless setup + compose + cleanup + final audit
  #    (was steps 13-18)
  - |
    ssh -i {{ssh_key}} \
        -o StrictHostKeyChecking=accept-new \
        -o ConnectTimeout=15 \
        -o BatchMode=yes \
        {{vps_user}}@{{vps_host}} 'bash -s' <<PHASE3
    SP="${SUDO_PASSWORD}"

    echo "=== [13] Install Tailscale ==="
    curl -fsSL https://tailscale.com/install.sh | sh \
      && echo "\$SP" | sudo -S tailscale up \
      && TSIP=\$(tailscale ip -4 2>/dev/null || echo 'pending') \
      && echo "\$SP" | sudo -S ufw allow in on tailscale0 \
      && echo "\$SP" | sudo -S ufw allow 41641/udp \
      && echo "\$SP" | sudo -S ufw reload \
      && echo "[13] Tailscale installed. VPS Tailscale IP: \$TSIP" \
      && echo ">>> NEXT: SSH to \$TSIP from a NEW Termux session to verify Tailscale works." \
      && echo ">>> THEN run: sudo ufw delete allow 22/tcp && sudo ufw reload"

    echo ""
    echo "=== [14] Install Docker ==="
    echo "\$SP" | sudo -S apt update \
      && echo "\$SP" | sudo -S apt install -y ca-certificates curl gnupg uidmap dbus-user-session \
      && echo "\$SP" | sudo -S install -m 0755 -d /etc/apt/keyrings \
      && curl -fsSL https://download.docker.com/linux/ubuntu/gpg | echo "\$SP" | sudo -S gpg --dearmor -o /etc/apt/keyrings/docker.gpg \
      && echo "\$SP" | sudo -S chmod a+r /etc/apt/keyrings/docker.gpg \
      && echo "deb [arch=\$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \$(. /etc/os-release && echo \$VERSION_CODENAME) stable" | echo "\$SP" | sudo -S tee /etc/apt/sources.list.d/docker.list > /dev/null \
      && echo "\$SP" | sudo -S apt update \
      && echo "\$SP" | sudo -S apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin \
      && echo "\$SP" | sudo -S systemctl disable --now docker.service docker.socket \
      && echo "[14] Docker installed from official repo. Rootful daemon disabled."

    echo ""
    echo "=== [15] Docker rootless setup ==="
    echo "\$SP" | sudo -S -u {{vps_newuser}} bash -c 'dockerd-rootless-setuptool.sh install 2>&1' || true
    echo "\$SP" | sudo -S loginctl enable-linger {{vps_newuser}}
    grep -q 'DOCKER_HOST' /home/{{vps_newuser}}/.bashrc \
      || printf '\nexport PATH=/usr/bin:\$PATH\nexport DOCKER_HOST=unix:///run/user/\$(id -u)/docker.sock\n' | echo "\$SP" | sudo -S tee -a /home/{{vps_newuser}}/.bashrc
    echo "\$SP" | sudo -S mkdir -p /etc/systemd/system/user@.service.d
    printf '[Service]\nDelegate=cpu cpuset io memory pids\n' | echo "\$SP" | sudo -S tee /etc/systemd/system/user@.service.d/delegate.conf
    echo "\$SP" | sudo -S systemctl daemon-reload
    echo "\$SP" | sudo -S sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
    echo 'kernel.apparmor_restrict_unprivileged_userns=0' | echo "\$SP" | sudo -S tee /etc/sysctl.d/60-apparmor-namespace.conf
    echo "[15] Docker rootless configured for {{vps_newuser}}"

    echo ""
    echo "=== [16] Docker network + compose + auditd ==="
    echo "\$SP" | sudo -S -u {{vps_newuser}} bash -c '
      export XDG_RUNTIME_DIR=/run/user/\$(id -u)
      export DOCKER_HOST=unix:///run/user/\$(id -u)/docker.sock
      systemctl --user daemon-reload 2>/dev/null || true
      systemctl --user start docker 2>/dev/null || true
      sleep 2
      docker network create --internal clawdbot_isolated 2>/dev/null || echo "network exists"
      mkdir -p ~/clawdbot ~/clawdbot_data/db
      chmod 700 ~/clawdbot_data
      MYUID=\$(id -u)
      cat > ~/clawdbot/docker-compose.yml << COMPEOF
services:
  clawdbot:
    image: moltbot/agent:latest
    container_name: clawdbot_agent
    restart: always
    user: "\${MYUID}:\${MYUID}"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64M
    volumes:
      - ~/clawdbot_data:/app/data:rw
    networks:
      - clawdbot_isolated
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
networks:
  clawdbot_isolated:
    internal: true
COMPEOF
      mkdir -p ~/.config/docker
      printf "{\\n  \"log-driver\": \"json-file\",\\n  \"log-opts\": {\\n    \"max-size\": \"10m\",\\n    \"max-file\": \"3\"\\n  }\\n}\\n" > ~/.config/docker/daemon.json
      docker info | grep -i rootless || echo "Docker rootless may need user session restart"
    '
    echo "\$SP" | sudo -S apt install auditd -y
    echo '-w /usr/bin/dockerd -k docker' | echo "\$SP" | sudo -S tee /etc/audit/rules.d/docker.rules
    echo "\$SP" | sudo -S service auditd restart
    echo "[16] Docker network, compose, daemon config, and auditd done"

    echo ""
    echo "=== [17] Final cleanup ==="
    echo "\$SP" | sudo -S apt update \
      && echo "\$SP" | sudo -S apt upgrade -y \
      && echo "\$SP" | sudo -S apt autoremove -y \
      && echo "\$SP" | sudo -S apt autoclean
    echo "\$SP" | sudo -S dpkg --purge \$(dpkg -l | grep '^rc' | awk '{print \$2}') 2>/dev/null || true
    history -c && history -w
    echo "[17] Cleanup done"

    echo ""
    echo "=== [18] Final lynis audit ==="
    echo "\$SP" | sudo -S lynis audit system 2>&1 | grep -E '(Hardening index|Warning|Suggestion)' | head -20
    echo ""
    echo "[18] VPS HARDENING COMPLETE"
    echo ">>> Remember: sudo ufw delete allow 22/tcp ONLY after confirming Tailscale SSH works!"
    echo ">>> Reboot recommended: sudo reboot"
    PHASE3

rollback_command:
  - 'echo "Manual rollback required. Check /etc/ssh/sshd_config and UFW rules before proceeding."'

require_confirmation: true
parallel: false
retry_count: 0
timeout: 900
