# ============================================
# Clide Self-Update Skill (Service-Aware)
# ============================================
# Full update cycle: download latest binary, stop the systemd service,
# replace the binary, restart the service, and report the new version.
#
# This skill manages the entire lifecycle including the systemd service,
# unlike clide_update which only handles the binary itself.
#
# Usage:
#   run_skill self_update

name: self_update
description: >
  Full self-update cycle for Clide running as a systemd service.
  Downloads the latest binary via 'clide update', stops the clide service,
  replaces the binary if needed, restarts the service, and reports the
  new version. Use this on servers where Clide runs as a systemd service.
version: "1.0.0"
author: digitalAIventures LLC
tags:
  - clide
  - update
  - system
  - service

parameters: {}

commands:
  # ── 0. Record current version ────────────────────────────────────────────
  - >-
    echo "===== Clide Self-Update =====";
    OLD_VERSION=$(clide --version 2>/dev/null || echo "unknown");
    echo "Current version: $OLD_VERSION";
    echo "Service status:  $(systemctl is-active clide 2>/dev/null || echo 'unknown')";
    echo ""

  # ── 1. Download latest binary via clide update ───────────────────────────
  - >-
    echo "[1/4] Downloading latest binary...";
    clide update 2>&1;
    if [ $? -eq 0 ]; then
    echo "[1/4] Download successful.";
    else
    echo "[1/4] WARNING: 'clide update' returned non-zero. Continuing anyway...";
    fi

  # ── 2. Stop the clide service ────────────────────────────────────────────
  - >-
    echo "[2/4] Stopping clide service...";
    sudo systemctl stop clide 2>&1;
    sleep 1;
    if [ "$(systemctl is-active clide 2>/dev/null)" = "inactive" ]; then
    echo "[2/4] Service stopped.";
    else
    echo "[2/4] WARNING: Service may still be running. Forcing stop...";
    sudo systemctl kill clide 2>/dev/null;
    sleep 1;
    fi

  # ── 3. Replace binary if a new one was downloaded ────────────────────────
  - >-
    echo "[3/4] Checking for updated binary...";
    SOURCE_BIN=~/Clide/target/release/clide;
    INSTALLED_BIN=/usr/local/bin/clide;
    if [ -f "$SOURCE_BIN" ]; then
    SOURCE_HASH=$(sha256sum "$SOURCE_BIN" 2>/dev/null | awk '{print $1}');
    INSTALLED_HASH=$(sha256sum "$INSTALLED_BIN" 2>/dev/null | awk '{print $1}');
    if [ "$SOURCE_HASH" != "$INSTALLED_HASH" ]; then
    echo "    New binary detected. Replacing...";
    sudo rm -f "$INSTALLED_BIN" &&
    sudo cp "$SOURCE_BIN" "$INSTALLED_BIN" &&
    sudo chmod +x "$INSTALLED_BIN";
    echo "[3/4] Binary replaced.";
    else
    echo "[3/4] Binary already up to date.";
    fi;
    else
    echo "[3/4] No source binary found at $SOURCE_BIN. Skipping replacement.";
    fi

  # ── 4. Restart the service and report ────────────────────────────────────
  - >-
    echo "[4/4] Restarting clide service...";
    sudo systemctl restart clide 2>&1;
    sleep 2;
    STATUS=$(systemctl is-active clide 2>/dev/null);
    NEW_VERSION=$(clide --version 2>/dev/null || echo "unknown");
    echo "";
    echo "===== Self-Update Complete =====";
    echo "New version:    $NEW_VERSION";
    echo "Service status: $STATUS";
    if [ "$STATUS" = "active" ]; then
    echo "Result:         Update successful!";
    else
    echo "Result:         WARNING — service is not active. Check logs:";
    echo "                sudo journalctl -u clide --no-pager -n 20";
    fi

rollback_command:
  - >-
    echo "Rollback: Restarting clide service...";
    sudo systemctl restart clide 2>&1;
    echo "Service status: $(systemctl is-active clide 2>/dev/null)"

require_confirmation: false
parallel: false
retry_count: 0
timeout: 300
