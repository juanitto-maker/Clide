# ============================================
# Vault Skill — encrypted secrets backup & restore
# ============================================
# Backs up ~/.clide/secrets.yaml and ~/.clide/hosts.yaml to a private
# GitHub Gist, encrypted with `age` (passphrase-based).
#
# DEPENDENCIES (installed automatically by clide_install.yaml):
#   pkg install age
#   pkg install gh   (GitHub CLI)  OR  manual curl API calls
#
# SECRETS REQUIRED (in ~/.clide/secrets.yaml):
#   GITHUB_TOKEN: ""      ← GitHub personal access token (gist scope)
#   VAULT_GIST_ID: ""     ← filled automatically after first backup
#
# PASSPHRASE:
#   Never stored anywhere — you enter it interactively.
#   age prompts you for it; recovery requires knowing it.
#
# HOW IT WORKS:
#   backup:
#     1. tar secrets.yaml + hosts.yaml → vault.tar.gz
#     2. age -p vault.tar.gz → vault.tar.gz.age  (prompts for passphrase)
#     3. Push encrypted blob to private GitHub Gist (base64-encoded so
#        Gist accepts binary content)
#     4. Save gist ID to ~/.clide/vault_gist_id  (not a secret)
#
#   restore:
#     1. Pull encrypted blob from GitHub Gist (ID from vault_gist_id or arg)
#     2. Decode base64 → vault.tar.gz.age
#     3. age -d → vault.tar.gz  (prompts for passphrase)
#     4. Extract → ~/.clide/secrets.yaml + hosts.yaml
#     5. Fix permissions (chmod 600)
#
# USAGE (via Telegram):
#   "backup my vault"
#   "restore vault"
#   "vault status"
#
# LOCAL CLI:
#   clide_vault_backup.sh    (generated by install)
#   clide_vault_restore.sh   (generated by install)
# ============================================

name: vault
description: |
  Encrypted backup and restore of Clide secrets and host registry.
  Uses age encryption (passphrase) and GitHub Gist as remote storage.
  Two sub-actions: backup and restore.
version: "1.0.0"
author: Clide
tags:
  - backup
  - security
  - recovery
  - vault

parameters:
  action:
    description: "backup | restore | status"
    type: string
    required: true
    default: "status"
  gist_id:
    description: "GitHub Gist ID (override ~/.clide/vault_gist_id)"
    type: string
    required: false
    default: ""

commands:
  # ── Sanity check: age must be installed ────────────────────────────────────
  - |
    if ! command -v age >/dev/null 2>&1; then
      echo "ERROR: 'age' is not installed. Run: pkg install age"
      exit 1
    fi

  # ── Dispatch to sub-action ─────────────────────────────────────────────────
  - |
    ACTION="{{action}}"
    CLIDE_DIR="$HOME/.clide"
    VAULT_TMP="$CLIDE_DIR/vault_tmp"
    GIST_ID_FILE="$CLIDE_DIR/vault_gist_id"

    mkdir -p "$VAULT_TMP"
    chmod 700 "$VAULT_TMP"

    # ── STATUS ─────────────────────────────────────────────────────────────
    if [ "$ACTION" = "status" ]; then
      echo "=== Vault Status ==="
      if [ -f "$GIST_ID_FILE" ]; then
        GIST_ID=$(cat "$GIST_ID_FILE")
        echo "Gist ID: $GIST_ID"
        echo "URL: https://gist.github.com/$GIST_ID"
      else
        echo "No vault created yet. Run: vault backup"
      fi
      echo ""
      echo "Secrets file : $([ -f "$CLIDE_DIR/secrets.yaml" ] && echo "EXISTS" || echo "MISSING")"
      echo "Hosts file   : $([ -f "$CLIDE_DIR/hosts.yaml" ] && echo "EXISTS" || echo "MISSING")"
      echo "age installed: $(command -v age >/dev/null 2>&1 && echo "YES" || echo "NO")"
      exit 0
    fi

    # ── BACKUP ─────────────────────────────────────────────────────────────
    if [ "$ACTION" = "backup" ]; then
      echo "=== Vault Backup ==="

      # Collect files to backup
      FILES_TO_BACKUP=""
      [ -f "$CLIDE_DIR/secrets.yaml" ] && FILES_TO_BACKUP="$FILES_TO_BACKUP secrets.yaml"
      [ -f "$CLIDE_DIR/hosts.yaml"   ] && FILES_TO_BACKUP="$FILES_TO_BACKUP hosts.yaml"

      if [ -z "$FILES_TO_BACKUP" ]; then
        echo "ERROR: Nothing to backup (secrets.yaml and hosts.yaml both missing)."
        exit 1
      fi

      echo "Files: $FILES_TO_BACKUP"

      # Create archive
      ARCHIVE="$VAULT_TMP/vault.tar.gz"
      tar -czf "$ARCHIVE" -C "$CLIDE_DIR" $FILES_TO_BACKUP
      echo "Archive created: $(du -h "$ARCHIVE" | cut -f1)"

      # Encrypt with age (interactive passphrase prompt)
      ENCRYPTED="$VAULT_TMP/vault.tar.gz.age"
      echo ""
      echo ">>> Enter your vault passphrase (you must remember this for recovery):"
      age -p -o "$ENCRYPTED" "$ARCHIVE"
      rm -f "$ARCHIVE"
      echo "Encrypted: $(du -h "$ENCRYPTED" | cut -f1)"

      # Encode to base64 for Gist (Gist only handles text)
      ENCODED="$VAULT_TMP/vault.b64"
      base64 "$ENCRYPTED" > "$ENCODED"
      rm -f "$ENCRYPTED"

      # Determine gist ID
      GIST_ID="{{gist_id}}"
      [ -z "$GIST_ID" ] && [ -f "$GIST_ID_FILE" ] && GIST_ID=$(cat "$GIST_ID_FILE")

      if [ -z "${GITHUB_TOKEN}" ]; then
        echo "ERROR: GITHUB_TOKEN not set in secrets.yaml."
        echo "Add:   GITHUB_TOKEN: \"ghp_...\""
        exit 1
      fi

      # Push to GitHub Gist (create or update)
      CONTENT=$(cat "$ENCODED")
      TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      if [ -z "$GIST_ID" ]; then
        echo "Creating new private Gist..."
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{\"description\":\"Clide vault backup ${TIMESTAMP}\",\"public\":false,\"files\":{\"vault.b64\":{\"content\":\"${CONTENT}\"}}}" \
          "https://api.github.com/gists")
        GIST_ID=$(echo "$RESPONSE" | grep '"id"' | head -1 | sed 's/.*"id": *"\([^"]*\)".*/\1/')
        if [ -z "$GIST_ID" ]; then
          echo "ERROR: Failed to create Gist. Response:"
          echo "$RESPONSE" | head -5
          exit 1
        fi
        echo "$GIST_ID" > "$GIST_ID_FILE"
        chmod 600 "$GIST_ID_FILE"
        echo "New Gist created: $GIST_ID"
      else
        echo "Updating existing Gist: $GIST_ID ..."
        RESPONSE=$(curl -s -X PATCH \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{\"description\":\"Clide vault backup ${TIMESTAMP}\",\"files\":{\"vault.b64\":{\"content\":\"${CONTENT}\"}}}" \
          "https://api.github.com/gists/$GIST_ID")
        if echo "$RESPONSE" | grep -q '"id"'; then
          echo "Gist updated: $GIST_ID"
        else
          echo "ERROR: Failed to update Gist. Response:"
          echo "$RESPONSE" | head -5
          exit 1
        fi
      fi

      rm -f "$ENCODED"
      echo ""
      echo "✅ Vault backup complete."
      echo "   Gist ID : $GIST_ID"
      echo "   To restore: clide install --restore OR vault restore"
      exit 0
    fi

    # ── RESTORE ────────────────────────────────────────────────────────────
    if [ "$ACTION" = "restore" ]; then
      echo "=== Vault Restore ==="

      GIST_ID="{{gist_id}}"
      [ -z "$GIST_ID" ] && [ -f "$GIST_ID_FILE" ] && GIST_ID=$(cat "$GIST_ID_FILE")

      if [ -z "$GIST_ID" ]; then
        echo "ERROR: No Gist ID found."
        echo "Pass it as: vault restore gist_id=<ID>"
        echo "Or create a backup first: vault backup"
        exit 1
      fi

      if [ -z "${GITHUB_TOKEN}" ]; then
        echo "ERROR: GITHUB_TOKEN not set in secrets.yaml."
        exit 1
      fi

      echo "Fetching vault from Gist: $GIST_ID ..."
      ENCODED=$(curl -s \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        "https://api.github.com/gists/$GIST_ID" \
        | grep '"content"' | head -1 \
        | sed 's/.*"content": *"\(.*\)".*/\1/' \
        | sed 's/\\n/\n/g')

      if [ -z "$ENCODED" ]; then
        echo "ERROR: Empty response from Gist API. Check GITHUB_TOKEN and Gist ID."
        exit 1
      fi

      ENCRYPTED="$VAULT_TMP/vault.tar.gz.age"
      echo "$ENCODED" | base64 -d > "$ENCRYPTED"

      ARCHIVE="$VAULT_TMP/vault.tar.gz"
      echo ""
      echo ">>> Enter your vault passphrase to decrypt:"
      age -d -o "$ARCHIVE" "$ENCRYPTED"
      rm -f "$ENCRYPTED"

      echo "Extracting to $CLIDE_DIR ..."
      tar -xzf "$ARCHIVE" -C "$CLIDE_DIR"
      rm -f "$ARCHIVE"

      # Fix permissions
      [ -f "$CLIDE_DIR/secrets.yaml" ] && chmod 600 "$CLIDE_DIR/secrets.yaml"
      [ -f "$CLIDE_DIR/hosts.yaml"   ] && chmod 600 "$CLIDE_DIR/hosts.yaml"

      echo ""
      echo "✅ Vault restored."
      echo "   secrets.yaml : $([ -f "$CLIDE_DIR/secrets.yaml" ] && echo "OK" || echo "NOT FOUND")"
      echo "   hosts.yaml   : $([ -f "$CLIDE_DIR/hosts.yaml"   ] && echo "OK" || echo "NOT FOUND")"
      echo ""
      echo "Restart the bot: pkill clide && clide --bot &"
      exit 0
    fi

    echo "Unknown action: $ACTION"
    echo "Usage: vault backup | restore | status"
    exit 1

require_confirmation: true
parallel: false
retry_count: 0
timeout: 120
