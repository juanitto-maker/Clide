# ============================================
# Clide Secrets (~/.clide/secrets.yaml)
# ============================================
# Copy this file to ~/.clide/secrets.yaml and fill in your keys.
# The installer does this automatically.
#
# SECURITY:
#   chmod 600 ~/.clide/secrets.yaml   ← set automatically; owner read-only
#   This file is NEVER committed to git.
#
# HOW IT WORKS:
#   1. Clide loads this file on start-up (after config.yaml).
#   2. Named keys (GEMINI_API_KEY, etc.) are applied to the matching
#      config fields automatically.
#   3. Every key is also available as ${KEY_NAME} in skill commands,
#      resolved at execution time — the AI never sees the actual values.
#   4. Named hosts from hosts.yaml are injected as:
#        ${HOST_PROD_IP}, ${HOST_PROD_USER}, ${HOST_PROD_KEY_PATH}, ...
#   5. Environment variables override both config.yaml and secrets.yaml.
#
# PRIORITY (highest → lowest):
#   env var  >  secrets.yaml / pass  >  config.yaml  >  built-in default
#
# GNU pass INTEGRATION (optional, GPG-encrypted layer):
#   Any value starting with "pass:" is resolved via `pass show <path>`.
#   Requires: pkg install gnupg pass && clide secret pass-init
#   Example:
#     GEMINI_API_KEY: "pass:clide/gemini"
#     VPS_ROOT_PW:    "pass:servers/prod/root"
#
# MANAGE SECRETS:
#   clide secret list              → show all key names
#   clide secret set MY_KEY        → store a value (interactive, hidden)
#   clide secret generate MY_KEY   → generate + store a random value
#   clide secret pass-init         → set up GNU pass (GPG layer)
#   clide secret pass-set MY_KEY   → move a key from here into pass
# ============================================

# ── Primary AI provider ─────────────────────────────────────────────────────
# Google Gemini — used by the built-in autonomous agent
# Get a free key at https://aistudio.google.com/app/apikey
GEMINI_API_KEY: ""

# ── Messaging platforms ─────────────────────────────────────────────────────
# Matrix/Element access token (bearer token for the bot account)
MATRIX_ACCESS_TOKEN: ""

# Telegram bot token from @BotFather
TELEGRAM_BOT_TOKEN: ""

# ── Additional AI providers (used by skills, e.g. aiwb_manager) ─────────────
# Anthropic Claude — https://console.anthropic.com/settings/keys
ANTHROPIC_API_KEY: ""

# OpenAI — https://platform.openai.com/api-keys
OPENAI_API_KEY: ""

# Groq — https://console.groq.com/keys
GROQ_API_KEY: ""

# xAI Grok — https://console.x.ai
XAI_API_KEY: ""

# ── Vault (encrypted backup to GitHub Gist) ──────────────────────────────────
# GitHub personal access token with "gist" scope.
# Create at: GitHub → Settings → Developer Settings → Personal Access Tokens
# Used by: vault backup / vault restore / install.sh --restore
GITHUB_TOKEN: ""

# ── Sudo password ──────────────────────────────────────────────────────────
# Used by skills that run sudo on the VPS.  Commands are invoked as:
#   echo ${SUDO_PASSWORD} | sudo -S <command>
# so the password is never visible to the AI — only the placeholder is.
SUDO_PASSWORD: ""

# ── Custom secrets ───────────────────────────────────────────────────────────
# Add any additional secrets here; reference them in skill commands
# as ${KEY_NAME}.  Examples:
#
# VPS_ROOT_PASSWORD: ""                      ← plain text (file-perm protected)
# VPS_ROOT_PASSWORD: "pass:servers/prod"     ← GPG-encrypted via pass
# MY_GITHUB_TOKEN: ""
# MY_DISCORD_WEBHOOK: ""
