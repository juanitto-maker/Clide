name: Auto Release

# Build and release on every push to main.
# Version is derived from the latest git tag (single source of truth).
# Automatically bumps the patch version (0.4.3 → 0.4.4 → 0.4.5 ...).
# Skip by including [skip release] in the commit message.

on:
  push:
    branches: [main]

# Prevent overlapping release runs
concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-skip:
    name: Check skip conditions
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$COMMIT_MSG" | grep -qiE '\[skip release\]|\[release\] update Cargo\.toml'; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  bump-version:
    name: Bump patch version
    needs: check-skip
    if: needs.check-skip.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version from latest git tag
        id: bump
        run: |
          set -euo pipefail

          # Single source of truth: highest semver git tag.
          # Handle both "v0.4.3" and "v.0.4.3" tag formats (legacy used v. prefix).
          # Strip any leading "v" or "v." to get the raw version, then sort.
          echo "All version tags:"
          git tag -l 'v*' | head -20

          CURRENT=$(git tag -l 'v*' | sed 's/^v\.*//;' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)

          if [ -z "$CURRENT" ]; then
            echo "::error::No semver tags found (expected v*.*.* or v.*.*.* tags)"
            exit 1
          fi

          echo "Highest version from git tags: $CURRENT"

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "Bumping $CURRENT → $NEW_VERSION"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

          # Sanity check: new tag must not already exist (check both formats)
          if git rev-parse "refs/tags/v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${NEW_VERSION} already exists"
            exit 1
          fi
          if git rev-parse "refs/tags/v.${NEW_VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v.${NEW_VERSION} already exists (legacy format)"
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: bump-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: clide-x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            artifact: clide-aarch64
            use_cross: true
          - target: aarch64-linux-android
            artifact: clide-aarch64-android
            use_cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Set version in Cargo.toml
        run: |
          NEW_VERSION="${{ needs.bump-version.outputs.new_version }}"
          echo "Setting version to: '$NEW_VERSION'"
          sed -i "s/^version = .*/version = \"${NEW_VERSION}\"/" Cargo.toml
          echo "Result:"
          head -5 Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install cross (Android only)
        if: matrix.target == 'aarch64-linux-android'
        run: cargo install cross --version 0.2.5

      - name: Build (native x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (aarch64-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Android via cross)
        if: matrix.target == 'aarch64-linux-android'
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/clide ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.bump-version.outputs.new_tag }}"
          git push origin "${{ needs.bump-version.outputs.new_tag }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          name: ${{ needs.bump-version.outputs.new_tag }}
          files: artifacts/*
          generate_release_notes: true

  update-cargo-toml:
    name: Update Cargo.toml on main
    needs: [bump-version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update Cargo.toml and push
        run: |
          sed -i "s/^version = .*/version = \"${{ needs.bump-version.outputs.new_version }}\"/" Cargo.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git diff --staged --quiet || {
            git commit -m "[release] update Cargo.toml to ${{ needs.bump-version.outputs.new_version }}"
            git push origin main
          }
