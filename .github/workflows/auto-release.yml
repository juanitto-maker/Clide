name: Auto Release

# Build and release on every push to main.
# Automatically bumps the patch version (0.2.1 → 0.2.2 → 0.2.3 ...).
# Skip by including [skip release] in the commit message.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-skip:
    name: Check skip conditions
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qiE '\[skip release\]|\[release\] update Cargo\.toml'; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  bump-version:
    name: Bump patch version
    needs: check-skip
    if: needs.check-skip.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION"

      - name: Check tag doesn't already exist
        run: |
          if git rev-parse "refs/tags/${{ steps.bump.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.bump.outputs.new_tag }} already exists"
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: bump-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: clide-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: clide-aarch64
          - target: aarch64-linux-android
            artifact: clide-aarch64-android
    steps:
      - uses: actions/checkout@v4

      - name: Set version in Cargo.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ needs.bump-version.outputs.new_version }}\"/" Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/clide ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.bump-version.outputs.new_tag }}"
          git push origin "${{ needs.bump-version.outputs.new_tag }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          name: ${{ needs.bump-version.outputs.new_tag }}
          files: artifacts/*
          generate_release_notes: true

  update-cargo-toml:
    name: Update Cargo.toml on main
    needs: [bump-version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update Cargo.toml and push
        run: |
          sed -i "s/^version = .*/version = \"${{ needs.bump-version.outputs.new_version }}\"/" Cargo.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git diff --staged --quiet || {
            git commit -m "[release] update Cargo.toml to ${{ needs.bump-version.outputs.new_version }}"
            git push origin main
          }
